# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Enable Corepack
      run: corepack enable
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        cache: yarn
        node-version-file: .nvmrc
    - name: Install dependencies
      run: yarn install
    - name: Copy private files
      run: |
        cp src/i18n/strings/base/private.deploy.ts src/i18n/strings/base/private.ts
        cp src/i18n/strings/en/private.deploy.ts src/i18n/strings/en/private.ts
    - name: Type check
      run: yarn type-check
    - name: Run unit tests
      run: yarn test:unit
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Copy private files
      run: |
        cp src/i18n/strings/base/private.deploy.ts src/i18n/strings/base/private.ts
        cp src/i18n/strings/en/private.deploy.ts src/i18n/strings/en/private.ts
    - name: Enable Corepack
      run: corepack enable
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        cache: yarn
        node-version-file: .nvmrc
    - name: Install dependencies
      run: yarn install
    - name: Install Playwright browsers
      # Use Yarn (not npx) so the project-pinned Playwright resolves through
      # Yarn 4's dependency graph and installs browser builds matching
      # @playwright/test's expected version. `npx playwright` fetches a
      # different registry version and installs mismatched builds.
      run: yarn playwright install --with-deps
    - name: Build project
      run: yarn build
    - name: Run E2E tests
      run: yarn test:e2e
  lint:
    name: Linters
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Copy private files
      run: |
        cp src/i18n/strings/base/private.deploy.ts src/i18n/strings/base/private.ts
        cp src/i18n/strings/en/private.deploy.ts src/i18n/strings/en/private.ts
    - name: Enable Corepack
      run: corepack enable
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        cache: yarn
        node-version-file: .nvmrc
    - name: Install dependencies
      run: yarn install
    - name: Run ESLint
      run: yarn lint:eslint
    - name: Run Stylelint
      run: yarn lint:stylelint
    - name: Type check
      run: yarn type-check
